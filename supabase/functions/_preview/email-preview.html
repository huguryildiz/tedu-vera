<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VERA Email Preview</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 20px; background: #111; font-family: sans-serif; color: #fff; }
    nav { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
    button { padding: 8px 16px; border-radius: 8px; border: 1px solid #444; background: #1a1a2e; color: #a0aec0; cursor: pointer; font-size: 13px; }
    button.active { background: #6c47ff; color: #fff; border-color: #6c47ff; }
    #preview { background-color: #0f0f1a; padding: 40px 0; border-radius: 12px; }
  </style>
</head>
<body>
  <nav>
    <button class="active" onclick="show('reset', this)">Password Reset</button>
    <button onclick="show('changed', this)">Password Changed</button>
    <button onclick="show('approved', this)">Application Approved</button>
    <button onclick="show('rejected', this)">Application Rejected</button>
    <button onclick="show('pin', this)">Juror PIN</button>
    <button onclick="show('token', this)">Entry Token</button>
    <button onclick="show('export', this)">Export Report</button>
    <button onclick="show('maintenance', this)">Maintenance Notice</button>
    <button onclick="show('pinreset', this)">PIN Reset Request</button>
    <button onclick="show('invite', this)">Org Admin Invite</button>
    <button onclick="show('submitted', this)">Application Submitted</button>
    <button onclick="show('scoreedit', this)">Score Edit Request</button>
    <button onclick="show('unlockRequested', this)">Unlock Requested</button>
    <button onclick="show('unlockApproved', this)">Unlock Approved</button>
    <button onclick="show('unlockRejected', this)">Unlock Rejected</button>
  </nav>
  <div id="preview"></div>

  <script>
    function mkScopeBlock(org, program, period) {
      return `
        <div style="margin:0 0 18px; border:1px solid rgba(108,71,255,0.5); border-radius:16px; background:rgba(255,255,255,0.03); overflow:hidden;">
          <div style="padding:14px 18px;">
            <p style="margin:0; font-size:11px; line-height:1.3; letter-spacing:1.2px; color:#7c5cff; font-weight:700;">ORGANIZATION</p>
            <p style="margin:6px 0 0; font-size:16px; line-height:1.4; color:#f1f5f9; font-weight:700;">${org}</p>
          </div>
          <div style="padding:14px 18px; border-top:1px solid rgba(255,255,255,0.08);">
            <p style="margin:0; font-size:11px; line-height:1.3; letter-spacing:1.2px; color:#7c5cff; font-weight:700;">PROGRAM</p>
            <p style="margin:6px 0 0; font-size:16px; line-height:1.4; color:#f1f5f9; font-weight:700;">${program}</p>
          </div>
          <div style="padding:14px 18px; border-top:1px solid rgba(255,255,255,0.08);">
            <p style="margin:0; font-size:11px; line-height:1.3; letter-spacing:1.2px; color:#7c5cff; font-weight:700;">PERIOD</p>
            <p style="margin:6px 0 0; font-size:16px; line-height:1.4; color:#f1f5f9; font-weight:700;">${period}</p>
          </div>
        </div>`;
    }

    function tpl(title, intro, body, ctaLabel) {
      return `
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#0f0f1a; padding:40px 0;">
          <tr><td align="center">
            <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px; width:100%; background:linear-gradient(160deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%); border-radius:16px; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,0.5);">
              <tr><td style="background:linear-gradient(90deg,#6c47ff,#a78bfa,#6c47ff); height:4px; font-size:0; line-height:0;">&nbsp;</td></tr>
              <tr><td align="center" style="padding:40px 40px 20px;">
                <img src="https://vera-eval.app/vera_logo_dark.png" alt="VERA" width="120" style="display:block; border:0;" />
              </td></tr>
              <tr><td align="center" style="padding:8px 48px 12px;">
                <h1 style="margin:0; font-size:25px; font-weight:700; color:#ffffff; letter-spacing:-0.5px;">${title}</h1>
              </td></tr>
              <tr><td align="center" style="padding:0 48px 20px;">
                <p style="margin:0; font-size:15px; line-height:1.7; color:#a0aec0;">${intro}</p>
              </td></tr>
              <tr><td align="center" style="padding:0 48px 8px;">
                <p style="margin:0 0 8px; font-size:14px; line-height:1.7; color:#a0aec0;">${body}</p>
              </td></tr>
              <tr><td align="center" style="padding:16px 48px 24px;">
                <a href="#" style="display:inline-block; background:linear-gradient(135deg,#6c47ff,#a78bfa); color:#ffffff; text-decoration:none; font-size:16px; font-weight:600; padding:14px 36px; border-radius:50px; letter-spacing:0.3px; box-shadow:0 4px 20px rgba(108,71,255,0.45);">${ctaLabel} &rarr;</a>
              </td></tr>
              <tr><td style="padding:0 48px;"><div style="border-top:1px solid rgba(255,255,255,0.08); font-size:0;">&nbsp;</div></td></tr>
              <tr><td align="center" style="padding:16px 48px 30px;">
                <p style="margin:0; font-size:12px; color:#4a5568; line-height:1.6;">&copy; 2026 VERA. All rights reserved.</p>
              </td></tr>
              <tr><td style="background:linear-gradient(90deg,#6c47ff,#a78bfa,#6c47ff); height:4px; font-size:0; line-height:0;">&nbsp;</td></tr>
            </table>
          </td></tr>
        </table>`;
    }

    function tokenTpl() {
      const tokenUrl = "https://vera-eval.app?eval=PREVIEW-TOKEN-2026";
      const organizationInstitution = "TED University";
      const organizationName = "Electrical-Electronics Engineering";
      const periodName = "Spring 2026";
      const expiresIn = "24h left";
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=12&color=ffffff&bgcolor=1a1a2e&data=${encodeURIComponent(tokenUrl)}`;
      const scopeBlock = mkScopeBlock(organizationInstitution, organizationName, periodName);

      return `
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#0f0f1a; padding:40px 0;">
          <tr><td align="center">
            <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px; width:100%; background:linear-gradient(160deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%); border-radius:16px; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,0.5);">
              <tr><td style="background:linear-gradient(90deg,#6c47ff,#a78bfa,#6c47ff); height:4px; font-size:0; line-height:0;">&nbsp;</td></tr>
              <tr><td align="center" style="padding:40px 40px 20px;">
                <img src="https://vera-eval.app/vera_logo_dark.png" alt="VERA" width="120" style="display:block; border:0;" />
              </td></tr>
              <tr><td align="center" style="padding:8px 48px 12px;">
                <h1 style="margin:0; font-size:25px; font-weight:700; color:#ffffff; letter-spacing:-0.5px;">Jury Evaluation Access</h1>
              </td></tr>
              <tr><td align="center" style="padding:0 48px 20px;">
                <p style="margin:0; font-size:15px; line-height:1.7; color:#a0aec0;">You have been invited to participate in a jury evaluation.</p>
              </td></tr>
              <tr><td style="padding:0 48px 8px;">
                ${scopeBlock}
                <p style="margin:0 0 16px; font-size:14px; line-height:1.7; color:#a0aec0;">Tap the button below or scan the QR code to open the evaluation platform. Your link is valid for <strong style="color:#fff;">${expiresIn}</strong> — use it promptly.</p>
                <table width="100%" cellpadding="0" cellspacing="0" border="0"><tr><td align="center" style="padding:0 0 16px;">
                  <img src="${qrUrl}" alt="Scan to join evaluation" width="180" height="180" style="display:block; border-radius:12px;" />
                  <p style="margin:8px 0 0; font-size:12px; color:#718096;">Scan with your phone camera</p>
                </td></tr></table>
              </td></tr>
              <tr><td align="center" style="padding:4px 48px 16px;">
                <a href="${tokenUrl}" style="display:inline-block; background:linear-gradient(135deg,#6c47ff,#a78bfa); color:#ffffff; text-decoration:none; font-size:16px; font-weight:600; padding:14px 36px; border-radius:50px; letter-spacing:0.3px; box-shadow:0 4px 20px rgba(108,71,255,0.45);">Join Evaluation &rarr;</a>
              </td></tr>
              <tr><td style="padding:0 48px 20px;">
                <div style="background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:12px 16px; word-break:break-all;">
                  <p style="margin:0 0 4px; font-size:11px; color:#4a5568; text-transform:uppercase; letter-spacing:0.5px;">Access Link</p>
                  <p style="margin:0; font-size:12px; color:#a0aec0; font-family:monospace;">${tokenUrl}</p>
                </div>
              </td></tr>
              <tr><td style="padding:0 48px;"><div style="border-top:1px solid rgba(255,255,255,0.08); font-size:0;">&nbsp;</div></td></tr>
              <tr><td align="center" style="padding:16px 48px 30px;"><p style="margin:0; font-size:12px; color:#4a5568; line-height:1.6;">&copy; 2026 VERA. All rights reserved.</p></td></tr>
              <tr><td style="background:linear-gradient(90deg,#6c47ff,#a78bfa,#6c47ff); height:4px; font-size:0; line-height:0;">&nbsp;</td></tr>
            </table>
          </td></tr>
        </table>`;
    }

    function pinTpl() {
      const pin = "4821";
      const jurorName = "Dr. Ayşe Kaya";
      const affiliation = "Electrical Engineering";
      const organization = "TED University";
      const periodLabel = "EE 492 — Spring 2026";
      const tokenUrl = "https://vera-eval.app?eval=PREVIEW-TOKEN-2026";

      const scopeBlock = mkScopeBlock(organization, affiliation, periodLabel);

      return `
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#0f0f1a; padding:40px 0;">
          <tr><td align="center">
            <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px; width:100%; background:linear-gradient(160deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%); border-radius:16px; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,0.5);">
              <tr><td style="background:linear-gradient(90deg,#6c47ff,#a78bfa,#6c47ff); height:4px; font-size:0; line-height:0;">&nbsp;</td></tr>
              <tr><td align="center" style="padding:40px 40px 20px;">
                <img src="https://vera-eval.app/vera_logo_dark.png" alt="VERA" width="120" style="display:block; border:0;" />
              </td></tr>
              <tr><td align="center" style="padding:8px 48px 12px;">
                <h1 style="margin:0; font-size:25px; font-weight:700; color:#ffffff; letter-spacing:-0.5px;">Your Evaluation PIN</h1>
              </td></tr>
              <tr><td align="center" style="padding:0 48px 16px;">
                <p style="margin:0; font-size:15px; line-height:1.7; color:#a0aec0;">Hello, <strong style="color:#fff;">${jurorName}</strong>.</p>
              </td></tr>
              <tr><td style="padding:0 48px 8px;">
                ${scopeBlock}
                <p style="margin:0 0 8px; font-size:14px; line-height:1.7; color:#a0aec0;">Your jury evaluation PIN has been set. Use it to authenticate when you access the evaluation platform. Keep it confidential — it will not be shown again.</p>
              </td></tr>
              <tr><td align="center" style="padding:12px 48px 20px;">
                <div style="display:inline-block; padding:24px 20px; background:rgba(0,0,0,0.3); border-radius:12px; border:1px solid rgba(108,71,255,0.3);">
                  ${digits}
                </div>
                <p style="margin:12px 0 0; font-size:11px; color:#4a5568;">This PIN will not be shown again after this email.</p>
              </td></tr>
              <tr><td align="center" style="padding:8px 48px 20px;">
                <img src="${`https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=12&color=ffffff&bgcolor=1a1a2e&data=${encodeURIComponent(tokenUrl)}`}" alt="Scan to join evaluation" width="180" height="180" style="display:block; margin:0 auto; border-radius:12px;" />
                <p style="margin:10px 0 0; font-size:12px; color:#718096;">Scan with your phone camera</p>
              </td></tr>
              <tr><td align="center" style="padding:4px 48px 28px;">
                <a href="${tokenUrl}" style="display:inline-block; background:linear-gradient(135deg,#6c47ff,#a78bfa); color:#ffffff; text-decoration:none; font-size:16px; font-weight:600; padding:14px 36px; border-radius:50px; letter-spacing:0.3px; box-shadow:0 4px 20px rgba(108,71,255,0.45);">Join Evaluation &rarr;</a>
              </td></tr>
              <tr><td style="padding:0 48px;"><div style="border-top:1px solid rgba(255,255,255,0.08); font-size:0;">&nbsp;</div></td></tr>
              <tr><td align="center" style="padding:16px 48px 30px;"><p style="margin:0; font-size:12px; color:#4a5568; line-height:1.6;">&copy; 2026 VERA. All rights reserved.</p></td></tr>
              <tr><td style="background:linear-gradient(90deg,#6c47ff,#a78bfa,#6c47ff); height:4px; font-size:0; line-height:0;">&nbsp;</td></tr>
            </table>
          </td></tr>
        </table>`;
    }

    function exportTpl() {
      const senderName = "Dr. Mehmet Yılmaz";
      const organization = "TED University";
      const department = "Electrical & Electronics Eng.";
      const periodName = "Spring 2026";
      const reportTitle = "Score Rankings";
      const fileName = "VERA_Rankings_TEDU_Spring-2026_2026-04-04.xlsx";
      const iconColor = "#16a34a";
      const iconLabel = "XLSX";
      const message = "Please review the attached rankings report before Monday's committee meeting.";

      // Subject is always static (mirrors edge function logic)
      const subjectPreview = "VERA Evaluation Report";

      const sentByLine = `<p style="margin:4px 0 16px;font-size:13px;color:#718096;">Sent by <strong style="color:#a0aec0;">${senderName}</strong></p>`;
      const scopeBlock = mkScopeBlock(organization, department, periodName);
      const messageBlock = `<div style="margin:0 0 20px;padding:14px 16px;background:rgba(255,255,255,0.05);border-radius:10px;border:1px solid rgba(255,255,255,0.08);">
        <p style="margin:0 0 4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:#718096;">Message from ${senderName}</p>
        <p style="margin:0;font-size:14px;line-height:1.7;color:#a0aec0;white-space:pre-wrap;">${message}</p>
      </div>`;

      return `
        <!-- Subject line preview -->
        <div style="font-family:sans-serif;font-size:12px;color:#718096;margin-bottom:12px;padding:8px 12px;background:#1a1a2e;border-radius:8px;border:1px solid #2a2a4e;">
          <span style="color:#4a5568;text-transform:uppercase;letter-spacing:0.5px;font-size:10px;font-weight:600;">Subject · </span>${subjectPreview}
        </div>

          <tr><td align="center">
            <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px; width:100%; background:linear-gradient(160deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%); border-radius:16px; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,0.5);">
              <tr><td style="background:linear-gradient(90deg,#6c47ff,#a78bfa,#6c47ff); height:4px; font-size:0; line-height:0;">&nbsp;</td></tr>
              <tr><td align="center" style="padding:40px 40px 20px;">

              <tr><td align="center" style="padding:8px 48px 12px;">
                <h1 style="margin:0; font-size:25px; font-weight:700; color:#ffffff; letter-spacing:-0.5px;">Export Report</h1>
              </td></tr>
              <tr><td style="padding:0 48px 8px;">
                <p style="margin:0; font-size:15px; line-height:1.7; color:#a0aec0;">A VERA evaluation report has been shared with you.</p>

                    <td width="48" valign="middle" style="padding-right:14px;">
                      <div style="width:42px;height:48px;border-radius:8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);text-align:center;line-height:48px;">
                        <span style="font-family:monospace;font-size:11px;font-weight:700;color:${iconColor};letter-spacing:0.3px;">${iconLabel}</span>
                      </div>
                    </td>
                    <td valign="middle">
                      <p style="margin:0;font-size:14px;font-weight:600;color:#ffffff;">${reportTitle}</p>

              </td></tr>
              <tr><td style="padding:16px 48px 0;"><div style="border-top:1px solid rgba(255,255,255,0.08); font-size:0;">&nbsp;</div></td></tr>
              <tr><td align="center" style="padding:16px 48px 30px;"><p style="margin:0; font-size:12px; color:#4a5568; line-height:1.6;">&copy; 2026 VERA. All rights reserved.</p></td></tr>
              <tr><td style="background:linear-gradient(90deg,#6c47ff,#a78bfa,#6c47ff); height:4px; font-size:0; line-height:0;">&nbsp;</td></tr>
            </table>
          </td></tr>
        </table>`;

    function maintenanceTpl() {
      const startTime = "April 5, 2026 at 02:00 AM PDT";

      const message   = "We will be performing scheduled database maintenance. The platform will be temporarily unavailable. All evaluation data is preserved and unaffected.";

      const windowBlock = `
        <div style="margin:12px 0 20px; padding:14px 16px; background:rgba(217,119,6,0.08); border-radius:10px; border:1px solid rgba(217,119,6,0.25);">
          <p style="margin:0 0 6px; font-size:14px; line-height:1.7; color:#a0aec0;"><strong style="color:#fbbf24;">Start:</strong> ${startTime}</p>
          <p style="margin:0 0 6px; font-size:14px; line-height:1.7; color:#a0aec0;"><strong style="color:#fbbf24;">Estimated end:</strong> ${endTime}</p>

          <p style="margin:0; font-size:14px; line-height:1.7; color:#a0aec0; white-space:pre-wrap;">${message}</p>
        </div>`;

      return `
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#0f0f1a; padding:40px 0;">
          <tr><td align="center">
            <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px; width:100%; background:linear-gradient(160deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%); border-radius:16px; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,0.5);">
              <tr><td style="background:linear-gradient(90deg,#d97706,#fbbf24,#d97706); height:4px; font-size:0; line-height:0;">&nbsp;</td></tr>
              <tr><td align="center" style="padding:40px 40px 20px;">
                <img src="https://vera-eval.app/vera_logo_dark.png" alt="VERA" width="120" style="display:block; border:0;" />
              </td></tr>
              <tr><td align="center" style="padding:8px 48px 12px;">
                <h1 style="margin:0; font-size:25px; font-weight:700; color:#ffffff; letter-spacing:-0.5px;">Scheduled Maintenance</h1>

            </table>

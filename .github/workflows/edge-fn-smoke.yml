name: Edge Function Smoke Test

# Schedule: daily at 6 AM UTC
# Also allow manual trigger via workflow_dispatch
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "vera-demo"
        type: choice
        options:
          - vera-demo
          - vera-prod

jobs:
  smoke-test:
    name: Smoke test deployed Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Edge Function smoke test
        run: node scripts/smoke-edge-functions.mjs ${{ inputs.environment || 'vera-demo' }}

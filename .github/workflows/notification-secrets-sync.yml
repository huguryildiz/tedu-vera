name: Sync Notification Secrets

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target Supabase project"
        required: true
        type: choice
        options:
          - demo
          - prod
      demo_profile:
        description: "Only for demo target: which URL profile to publish"
        required: false
        type: choice
        options:
          - local
          - vercel
        default: vercel
  push:
    branches:
      - develop
      - demo
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      NOTIFICATION_FROM: ${{ secrets.NOTIFICATION_FROM }}
      NOTIFICATION_LOGO_URL: ${{ secrets.NOTIFICATION_LOGO_URL }}
      DEMO_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_DEMO }}
      PROD_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_PROD }}
      DEMO_REVIEW_URL_LOCAL: ${{ secrets.NOTIFICATION_REVIEW_URL_DEMO_LOCAL }}
      DEMO_APP_URL_LOCAL: ${{ secrets.NOTIFICATION_APP_URL_DEMO_LOCAL }}
      DEMO_REVIEW_URL_VERCEL: ${{ secrets.NOTIFICATION_REVIEW_URL_DEMO_VERCEL }}
      DEMO_APP_URL_VERCEL: ${{ secrets.NOTIFICATION_APP_URL_DEMO_VERCEL }}
      PROD_REVIEW_URL: ${{ secrets.NOTIFICATION_REVIEW_URL_PROD }}
      PROD_APP_URL: ${{ secrets.NOTIFICATION_APP_URL_PROD }}
    steps:
      - name: Resolve target environment
        shell: bash
        run: |
          set -euo pipefail

          target=""
          demo_profile=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            target="${{ inputs.target }}"
            demo_profile="${{ inputs.demo_profile }}"
            if [[ -z "$demo_profile" ]]; then
              demo_profile="vercel"
            fi
          elif [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            target="demo"
            demo_profile="local"
          elif [[ "${GITHUB_REF_NAME}" == "demo" ]]; then
            target="demo"
            demo_profile="vercel"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            target="prod"
          fi

          if [[ -z "$target" ]]; then
            echo "Unable to resolve target environment."
            exit 1
          fi

          echo "TARGET_ENV=$target" >> "$GITHUB_ENV"
          echo "DEMO_PROFILE=$demo_profile" >> "$GITHUB_ENV"

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${SUPABASE_ACCESS_TOKEN:-}" ]] || { echo "Missing SUPABASE_ACCESS_TOKEN"; exit 1; }
          [[ -n "${NOTIFICATION_FROM:-}" ]] || { echo "Missing NOTIFICATION_FROM"; exit 1; }
          [[ -n "${NOTIFICATION_LOGO_URL:-}" ]] || { echo "Missing NOTIFICATION_LOGO_URL"; exit 1; }

          if [[ "$TARGET_ENV" == "demo" ]]; then
            [[ -n "${DEMO_PROJECT_REF:-}" ]] || { echo "Missing SUPABASE_PROJECT_REF_DEMO"; exit 1; }
            if [[ "$DEMO_PROFILE" == "local" ]]; then
              [[ -n "${DEMO_REVIEW_URL_LOCAL:-}" ]] || { echo "Missing NOTIFICATION_REVIEW_URL_DEMO_LOCAL"; exit 1; }
              [[ -n "${DEMO_APP_URL_LOCAL:-}" ]] || { echo "Missing NOTIFICATION_APP_URL_DEMO_LOCAL"; exit 1; }
            else
              [[ -n "${DEMO_REVIEW_URL_VERCEL:-}" ]] || { echo "Missing NOTIFICATION_REVIEW_URL_DEMO_VERCEL"; exit 1; }
              [[ -n "${DEMO_APP_URL_VERCEL:-}" ]] || { echo "Missing NOTIFICATION_APP_URL_DEMO_VERCEL"; exit 1; }
            fi
          else
            [[ -n "${PROD_PROJECT_REF:-}" ]] || { echo "Missing SUPABASE_PROJECT_REF_PROD"; exit 1; }
            [[ -n "${PROD_REVIEW_URL:-}" ]] || { echo "Missing NOTIFICATION_REVIEW_URL_PROD"; exit 1; }
            [[ -n "${PROD_APP_URL:-}" ]] || { echo "Missing NOTIFICATION_APP_URL_PROD"; exit 1; }
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Sync secrets to selected project
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$TARGET_ENV" == "demo" ]]; then
            PROJECT_REF="$DEMO_PROJECT_REF"
            if [[ "$DEMO_PROFILE" == "local" ]]; then
              REVIEW_URL="$DEMO_REVIEW_URL_LOCAL"
              APP_URL="$DEMO_APP_URL_LOCAL"
            else
              REVIEW_URL="$DEMO_REVIEW_URL_VERCEL"
              APP_URL="$DEMO_APP_URL_VERCEL"
            fi
          else
            PROJECT_REF="$PROD_PROJECT_REF"
            REVIEW_URL="$PROD_REVIEW_URL"
            APP_URL="$PROD_APP_URL"
          fi

          supabase secrets set \
            --project-ref "$PROJECT_REF" \
            NOTIFICATION_REVIEW_URL="$REVIEW_URL" \
            NOTIFICATION_APP_URL="$APP_URL" \
            NOTIFICATION_FROM="$NOTIFICATION_FROM" \
            NOTIFICATION_LOGO_URL="$NOTIFICATION_LOGO_URL"

      - name: Summary
        run: |
          echo "Notification secrets synced for: $TARGET_ENV (demo_profile=${DEMO_PROFILE:-n/a})"

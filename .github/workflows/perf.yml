name: Performance

on:
  workflow_dispatch:

jobs:
  perf:
    name: Concurrent jury
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(node -e "console.log(require('./node_modules/@playwright/test/package.json').version)")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run concurrent-jury perf test (4 parallel jurors, 90s SLO)
        run: npx playwright test e2e/perf/concurrent-jury.spec.ts --reporter=line,json
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/playwright-results.json
          CI: true
          # Demo Supabase project — NEVER run against vera-prod
          VITE_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          VITE_RPC_SECRET: ${{ secrets.E2E_RPC_SECRET }}
          # Service-role key for fixture setup/teardown
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SERVICE_ROLE_KEY }}
          # Demo mode (needed for VERA's demo-bypass auth path)
          VITE_DEMO_MODE: "true"
          VITE_DEMO_ADMIN_EMAIL: "demo-admin@vera-eval.app"
          VITE_DEMO_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          VITE_DEMO_ENTRY_TOKEN: ${{ secrets.E2E_DEMO_ENTRY_TOKEN }}
          # E2E flag — disables Supabase realtime to prevent race conditions
          VITE_E2E: "true"
          # Demo entry token PIN for fixture jurors
          E2E_JUROR_PIN: "9999"

      - name: Generate Excel perf report
        if: always()
        run: npm run e2e:excel
        continue-on-error: true

      - name: Upload Excel perf report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: excel-perf-${{ github.run_number }}
          path: test-results/e2e-report-*.xlsx
          retention-days: 30
          if-no-files-found: warn

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-${{ github.run_number }}
          path: test-results/
          retention-days: 14

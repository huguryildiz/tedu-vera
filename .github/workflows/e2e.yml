name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'  # nightly at 02:00 UTC — visual + a11y sweep

# Each job uses an isolated local Supabase stack, so there is no shared DB
# state to protect. Keeping the concurrency group only prevents runaway queues
# on the same branch — not correctness.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

# ── Shared env block (repeated per job; no YAML anchors in GHA) ──────────────
# LOCAL_* values are set after the start-local-supabase action runs.

jobs:
  e2e-admin:
    name: Admin panel (shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(node -e "console.log(require('./node_modules/@playwright/test/package.json').version)")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Start local Supabase + seed
        id: supabase
        uses: ./.github/actions/start-local-supabase

      - name: Run admin E2E tests
        run: npm run e2e -- --project=admin --shard=${{ matrix.shard }}/2 --reporter=line,json
        env:
          CI: true
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/playwright-results.json
          VITE_SUPABASE_URL:           ${{ steps.supabase.outputs.url }}
          VITE_SUPABASE_ANON_KEY:      ${{ steps.supabase.outputs.anon_key }}
          VITE_RPC_SECRET:             e2e-local-rpc-secret
          SUPABASE_SERVICE_ROLE_KEY:   ${{ steps.supabase.outputs.service_role_key }}
          E2E_SUPABASE_URL:            ${{ steps.supabase.outputs.url }}
          VITE_DEMO_MODE:              "true"
          VITE_DEMO_ADMIN_EMAIL:       "demo-admin@vera-eval.app"
          VITE_DEMO_ADMIN_PASSWORD:    "E2eLocal!Admin123"
          VITE_DEMO_ENTRY_TOKEN:       "demo-tedu-ee"
          VITE_E2E:                    "true"
          E2E_ADMIN_EMAIL:             "demo-admin@vera-eval.app"
          E2E_ADMIN_PASSWORD:          "E2eLocal!Admin123"
          E2E_TENANT_ADMIN_EMAIL:      "tenant-admin@vera-eval.app"
          E2E_TENANT_ADMIN_PASSWORD:   "TenantAdmin2026!"
          E2E_JUROR_NAME:              "E2E Test Juror"
          E2E_JUROR_DEPT:              "E2E Test Department"
          E2E_JUROR_PIN:               "7291"
          E2E_SEMESTER_NAME:           "Spring 2026"
          E2E_LOCKED:                  "false"

      - name: Generate Excel E2E report
        if: always()
        run: npm run e2e:excel
        continue-on-error: true

      - name: Upload Excel E2E report (admin shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: excel-e2e-admin-shard${{ matrix.shard }}-${{ github.run_number }}
          path: test-results/e2e-report-*.xlsx
          retention-days: 30
          if-no-files-found: warn

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-admin-${{ github.run_number }}-shard${{ matrix.shard }}
          path: test-results/
          retention-days: 14


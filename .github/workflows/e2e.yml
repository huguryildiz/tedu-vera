          E2E_ADMIN_PASSWORD:          ${{ secrets.E2E_ADMIN_PASSWORD }}

      - name: Upload a11y test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-results-${{ github.run_number }}
          path: test-results/
          retention-days: 14

  visual-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30

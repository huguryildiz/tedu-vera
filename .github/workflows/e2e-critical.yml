name: E2E Critical

# Hard-gate workflow for the highest-value E2E specs — settings persistence,
# scoring correctness, KPI analytics, audit coverage, and security boundaries.
# Runs on every PR and push to main. Must pass before merge.
#
# Phase 2 note (2026-04-26): overview-kpi and analytics-bias-outlier are now
# included because their inter-worker race conditions were resolved and all
# 16 tests pass reliably.
#
# To add a spec to this gate: confirm it passes consistently in the full e2e
# suite first, then add it to the `run` command below and bump timeout if needed.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel older runs on the same branch — shared vera-demo DB means overlapping
# pipelines can mutate global singletons under each other.
concurrency:
  group: e2e-critical-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-critical:
    name: Critical path E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(node -e "console.log(require('./node_modules/@playwright/test/package.json').version)")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run critical path E2E tests
        run: |
          npm run e2e -- \
            e2e/admin/settings-save.spec.ts \
            e2e/admin/outcome-attainment.spec.ts \
            e2e/admin/criteria-mapping.spec.ts \
            e2e/admin/criteria-validation.spec.ts \
            e2e/admin/scoring-correctness.spec.ts \
            e2e/admin/overview-kpi.spec.ts \
            e2e/admin/analytics-bias-outlier.spec.ts \
            e2e/admin/audit-event-coverage.spec.ts \
            e2e/security/period-immutability.spec.ts \
            e2e/security/rbac-boundary.spec.ts \
            --reporter=line,json
        env:
          CI: true
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/playwright-results.json
          VITE_SUPABASE_URL:           ${{ secrets.E2E_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY:      ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          VITE_RPC_SECRET:             ${{ secrets.E2E_RPC_SECRET }}
          SUPABASE_SERVICE_ROLE_KEY:   ${{ secrets.E2E_SERVICE_ROLE_KEY }}
          VITE_DEMO_MODE:              "true"
          VITE_DEMO_ADMIN_EMAIL:       "demo-admin@vera-eval.app"
          VITE_DEMO_ADMIN_PASSWORD:    ${{ secrets.E2E_ADMIN_PASSWORD }}
          VITE_DEMO_ENTRY_TOKEN:       ${{ secrets.E2E_DEMO_ENTRY_TOKEN }}
          VITE_E2E:                    "true"
          E2E_ADMIN_EMAIL:             "demo-admin@vera-eval.app"
          E2E_ADMIN_PASSWORD:          ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_TENANT_ADMIN_EMAIL:      "tenant-admin@vera-eval.app"
          E2E_TENANT_ADMIN_PASSWORD:   ${{ secrets.E2E_TENANT_ADMIN_PASSWORD }}
          E2E_JUROR_NAME:              "E2E Test Juror"
          E2E_JUROR_DEPT:              "E2E Test Department"
          E2E_JUROR_PIN:               "7291"
          E2E_SEMESTER_NAME:           "Spring 2026"
          E2E_LOCKED:                  "false"

      - name: Generate Excel E2E report
        if: always()
        run: npm run e2e:excel
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-critical-results-${{ github.run_number }}
          path: test-results/
          retention-days: 14

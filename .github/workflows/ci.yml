name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          mkdir -p test-results
          npm run test:report

      - name: Generate Excel report
        if: always()
        run: node scripts/generate-test-report.cjs

      - name: Generate Allure HTML report
        if: always()
        run: npm run allure:generate

      - name: Upload test-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 30

  e2e:
    if: false
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run e2e
        env:
          VITE_SUPABASE_URL:      ${{ secrets.E2E_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          VITE_RPC_SECRET:        ${{ secrets.E2E_RPC_SECRET }}
          E2E_ADMIN_PASSWORD:     ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_JUROR_NAME:         ${{ secrets.E2E_JUROR_NAME }}
          E2E_JUROR_DEPT:         ${{ secrets.E2E_JUROR_DEPT }}
          E2E_JUROR_PIN:          ${{ secrets.E2E_JUROR_PIN }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

name: CI

# Runs unit tests, edge function tests, repo-level lint checks, the production
# build, and pgTAP migration tests on every PR + push to main. Complements
# e2e.yml (Playwright) and perf.yml (concurrent jury, dispatch-only).
#
# Motivation: docs/qa/vera-test-audit-report.md §8 finding #1 — `if: false`
# on both jobs meant unit tests never gated PRs. 938 unit tests were passing
# locally but not enforced. This workflow closes that gap.
#
# History: migration-ci.yml was merged into this file 2026-04-25 — having two
# push/PR-triggered workflows with identical Node setup churned the GitHub
# Actions UI. All four jobs run in parallel by default.
#
# Note on migration-test: previously gated to `paths: sql/**`. After merge it
# runs on every PR. The job is `continue-on-error: true` (soft check during
# initial bootstrap), so non-sql PRs don't pay a hard cost — only a few
# minutes of wall-clock parallel.
#
# The `test-report` job (Allure + Excel) is gated on workflow_dispatch so the
# fast PR gate is not blocked by report-generation overhead.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs when a new commit lands on the same PR/branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Repo lint checks
        run: |
          npm run check:no-native-select
          npm run check:no-nested-panels
          npm run check:no-table-font-override
          npm run check:js-size
          npm run check:css-size

      - name: Run unit tests
        # `pool=forks` overrides the local `pool: 'vmForks'` (vite.config.js)
        # which is too memory-hungry for GitHub Actions runners — vmForks
        # caused 7 worker-exit crashes on canvas-using tests in the first
        # CI run after re-enabling. `forks` is cheaper and stable on CI.
        run: npx vitest run --reporter=dot --pool=forks

      - name: Production build
        run: npm run build
        env:
          # Vite requires these at build time; CI uses placeholder values.
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder
          VITE_RPC_SECRET: placeholder

  edge-tests:
    name: Edge function tests (Deno)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        # Deno 2.x required: the supabase/functions/deno.lock is lockfile
        # version 5, only readable by Deno 2.0+. setup-deno@v2 + v2.x pin.
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run edge function tests
        working-directory: supabase/functions
        run: >
          deno test
          --allow-net --allow-env --allow-read
          --import-map=_test/import_map.json

  migration-test:
    name: Migration + pgTAP
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # NOTE — soft check during initial bootstrap.
    # Re-applying VERA's snapshot migrations (001..009) on a vanilla
    # Postgres requires faithfully reproducing several Supabase-environment
    # dependencies (auth schema, supabase_realtime publication, storage
    # schema, possibly extensions). Each pass surfaces another piece. Until
    # those are all in the bootstrap below, mark the job continue-on-error
    # so the existence + early-stage value of the workflow does not block
    # PRs. Hard-fail will be flipped on once a clean fresh apply succeeds.
    continue-on-error: true

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: ci
      PGPASSWORD: ci
      PGDATABASE: vera_test

    steps:
      - uses: actions/checkout@v4

      - name: Install Postgres 15 + pgTAP from PGDG
        # postgresql-15-pgtap lives in the PostgreSQL Global Development Group
        # repo, not the default Ubuntu archive. Install postgres + pgtap on the
        # runner host so CREATE EXTENSION pgtap can find /usr/share/postgresql/15/
        # extension/pgtap.control.
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates lsb-release gnupg
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          # postgresql-15 brings the server + psql client; -pgtap brings the
          # extension; perl package brings pg_prove.
          sudo apt-get install -y postgresql-15 postgresql-15-pgtap libtap-parser-sourcehandler-pgtap-perl

      - name: Start Postgres 15 cluster on port 5432
        run: |
          # Ubuntu 24.04 runner image ships with postgres-16 already running
          # on port 5432, but pgtap is installed for the postgres-15 binary
          # tree (/usr/share/postgresql/15/extension/pgtap.control). Stop and
          # drop any non-15 cluster, then start only postgres-15 on 5432.
          echo "--- Existing clusters ---"
          sudo pg_lsclusters || true
          # Stop and drop everything that isn't postgres-15
          for v in 14 16 17; do
            sudo pg_ctlcluster $v main stop 2>/dev/null || true
            sudo pg_dropcluster $v main 2>/dev/null || true
          done
          # Recreate or restart 15 on port 5432
          if ! sudo pg_lsclusters | grep -q "^15 .*main"; then
            sudo pg_createcluster 15 main --port=5432
          fi
          sudo pg_ctlcluster 15 main stop 2>/dev/null || true
          # Force the port to 5432 in postgresql.conf in case a fresh cluster
          # was assigned a different port to avoid collisions.
          sudo sed -i "s/^port =.*/port = 5432/" /etc/postgresql/15/main/postgresql.conf
          sudo pg_ctlcluster 15 main start
          echo "--- Cluster after start ---"
          sudo pg_lsclusters
          sudo -u postgres psql -c "SELECT version();"

      - name: Create test role + db + auth shim
        run: |
          sudo -u postgres createuser -s ci
          sudo -u postgres psql -c "ALTER USER ci WITH PASSWORD 'ci';"
          sudo -u postgres createdb -O ci vera_test
          # Required app roles. Tests SET LOCAL role authenticated; if these
          # roles do not exist, become_a/become_b/become_super raise.
          sudo -u postgres psql -c "DO \$\$BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticated') THEN
              CREATE ROLE authenticated NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'anon') THEN
              CREATE ROLE anon NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'service_role') THEN
              CREATE ROLE service_role NOLOGIN BYPASSRLS;
            END IF;
          END\$\$;"
          # Auth schema is normally provided by Supabase. Create a minimal
          # stand-in so 002_tables / triggers that reference auth.users /
          # auth.uid() can resolve.
          sudo -u postgres psql -d vera_test -c "
            CREATE SCHEMA IF NOT EXISTS auth;
            CREATE TABLE IF NOT EXISTS auth.users (
              id uuid PRIMARY KEY,
              instance_id uuid,
              aud text,
              role text,
              email text,
              email_confirmed_at timestamptz,
              raw_user_meta_data jsonb,
              raw_app_meta_data jsonb,
              created_at timestamptz DEFAULT now(),
              updated_at timestamptz DEFAULT now()
            );
            CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid LANGUAGE sql STABLE
            AS \$\$ SELECT (NULLIF(current_setting('request.jwt.claims', true), '')::jsonb->>'sub')::uuid \$\$;
            ALTER FUNCTION auth.uid() OWNER TO postgres;
            CREATE OR REPLACE FUNCTION auth.jwt() RETURNS jsonb LANGUAGE sql STABLE
            AS \$\$ SELECT NULLIF(current_setting('request.jwt.claims', true), '')::jsonb \$\$;
            ALTER FUNCTION auth.jwt() OWNER TO postgres;
            CREATE OR REPLACE FUNCTION auth.role() RETURNS text LANGUAGE sql STABLE
            AS \$\$ SELECT NULLIF(current_setting('request.jwt.claims', true), '')::jsonb->>'role' \$\$;
            ALTER FUNCTION auth.role() OWNER TO postgres;
            CREATE OR REPLACE FUNCTION auth.email() RETURNS text LANGUAGE sql STABLE
            AS \$\$ SELECT NULLIF(current_setting('request.jwt.claims', true), '')::jsonb->>'email' \$\$;
            ALTER FUNCTION auth.email() OWNER TO postgres;"
          # Supabase Realtime publication — VERA's 002_tables.sql adds tables
          # to "supabase_realtime" so live updates flow to the admin UI.
          # NOTE: Postgres does not support "IF NOT EXISTS" for CREATE PUBLICATION,
          # so guard with a DO block instead.
          sudo -u postgres psql -d vera_test -c "DO \$\$BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_publication WHERE pubname = 'supabase_realtime') THEN
              CREATE PUBLICATION supabase_realtime;
            END IF;
          END\$\$;"
          # Allow ci user to write into vera_test
          sudo -u postgres psql -d vera_test -c "GRANT ALL ON SCHEMA public, auth TO ci;"

      - name: Wait for Postgres to accept connections
        run: |
          until pg_isready -h localhost -p 5432; do sleep 1; done

      - name: Apply migrations in order (001 → 007)
        # 008_platform requires pg_cron and 009_audit depends on platform —
        # both are Supabase-managed extensions not available on PGDG vanilla
        # Postgres. Our pgTAP suite (constraints/triggers/rls/rpcs) only
        # exercises objects defined through 007, so we stop there. Re-enable
        # 008/009 once the runner ships pg_cron + pg_net.
        run: |
          for f in 001_extensions 002_tables 003_helpers_and_triggers 004_rls 005_rpcs_jury 006a_rpcs_admin 006b_rpcs_admin 007_identity; do
            echo "--- Applying $f.sql ---"
            psql -v ON_ERROR_STOP=1 -f sql/migrations/$f.sql || exit 1
          done

      - name: Load pgTAP test helpers
        run: |
          echo "--- Loading test helpers (_helpers.sql) ---"
          psql -v ON_ERROR_STOP=1 -f sql/tests/_helpers.sql

      - name: Run pgTAP test suite via pg_prove
        run: |
          echo "--- Running pgTAP tests ---"
          pg_prove --verbose \
            sql/tests/constraints/*.sql \
            sql/tests/triggers/*.sql \
            sql/tests/rls/*.sql \
            sql/tests/rpcs/jury/*.sql \
            sql/tests/rpcs/admin/*.sql \
            sql/tests/rpcs/contracts/*.sql

      - name: Test suite summary
        if: success()
        run: echo "✓ All migrations applied successfully and all pgTAP tests passed"

  test-report:
    # Allure + Excel reporting — heavyweight, runs only on manual dispatch.
    name: Full report (Allure + Excel)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate test results + Allure
        run: |
          mkdir -p test-results
          npm run test:report

      - name: Generate Excel report
        if: always()
        run: node scripts/generate-test-report.cjs

      - name: Generate Allure HTML
        if: always()
        run: npm run allure:generate

      - name: Upload test-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 30

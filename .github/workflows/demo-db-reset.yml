name: Demo DB Daily Reset

on:
  schedule:
    - cron: '0 4 * * *' # 04:00 UTC (07:00 Turkey)
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Force IPv4 DNS resolution (GitHub runners lack IPv6 connectivity)
        run: |
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          echo 'precedence ::ffff:0:0/96 100' | sudo tee -a /etc/gai.conf

      - name: Run seed SQL against demo database
        env:
          DEMO_DATABASE_URL: ${{ secrets.DEMO_DATABASE_URL }}
        run: |
          cat \
            sql/seeds/001_orgs_users.sql \
            sql/seeds/002_frameworks.sql \
            sql/seeds/003_periods.sql \
            sql/seeds/004_projects_jurors.sql \
            sql/seeds/005_scores.sql \
            sql/seeds/006_tokens_audit.sql \
            sql/seeds/007_descriptions.sql \
          | psql "$DEMO_DATABASE_URL" --no-psqlrc -v ON_ERROR_STOP=1

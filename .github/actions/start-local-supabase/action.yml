name: Start local Supabase
description: >
  Installs the Supabase CLI, starts a fully-isolated local Supabase stack,
  applies migrations 001-009, and seeds the E2E fixture data.
  Each CI job that uses this action gets its own ephemeral database — no shared
  state with other parallel jobs.

outputs:
  url:
    description: Local Supabase API URL (http://127.0.0.1:54321)
    value: ${{ steps.creds.outputs.url }}
  anon_key:
    description: Local anon JWT
    value: ${{ steps.creds.outputs.anon_key }}
  service_role_key:
    description: Local service-role JWT
    value: ${{ steps.creds.outputs.service_role_key }}

runs:
  using: composite
  steps:
    - name: Install Supabase CLI
      uses: supabase/setup-cli@v1
      with:
        version: latest

    - name: Start local Supabase stack
      shell: bash
      run: supabase start --workdir ${{ github.workspace }}

    - name: Capture local credentials
      id: creds
      shell: bash
      run: |
        STATUS=$(supabase status --workdir ${{ github.workspace }} 2>&1)
        ANON_KEY=$(echo "$STATUS"     | grep -E 'anon key'          | awk '{print $NF}')
        SERVICE_KEY=$(echo "$STATUS"  | grep -E 'service_role key'  | awk '{print $NF}')
        echo "url=http://127.0.0.1:54321"       >> $GITHUB_OUTPUT
        echo "anon_key=$ANON_KEY"               >> $GITHUB_OUTPUT
        echo "service_role_key=$SERVICE_KEY"    >> $GITHUB_OUTPUT

    - name: Apply migrations (001-009)
      shell: bash
      run: |
        DB="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
        for f in \
          sql/migrations/001_extensions.sql \
          sql/migrations/002_tables.sql \
          sql/migrations/003_helpers_and_triggers.sql \
          sql/migrations/004_rls.sql \
          sql/migrations/005_rpcs_jury.sql \
          sql/migrations/006a_rpcs_admin.sql \
          sql/migrations/006b_rpcs_admin.sql \
          sql/migrations/007_identity.sql \
          sql/migrations/008_platform.sql \
          sql/migrations/009_audit.sql
        do
          echo "Applying $f …"
          psql "$DB" -v ON_ERROR_STOP=1 -f "$f"
        done
      working-directory: ${{ github.workspace }}

    - name: Apply E2E seed
      shell: bash
      run: |
        DB="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
        psql "$DB" -v ON_ERROR_STOP=1 -f sql/seeds/e2e_seed.sql
      working-directory: ${{ github.workspace }}
